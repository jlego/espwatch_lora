; === ESPWatch-LoRa with E22-400MM22S (SX1268, external RF switch) ===

[espwatch_lora_e22_400mm22s_base]
extends = espwatch_lora_sx1268_base
build_flags =
  ${espwatch_lora_sx1268_base.build_flags}
  ; E22-400MM22S SPI pins (SPI2)
  -D P_LORA_NSS=13      ; Chip Select / NSS
  -D P_LORA_BUSY=10     ; BUSY
  -D P_LORA_MOSI=12     ; MOSI
  -D P_LORA_MISO=11     ; MISO
  -D P_LORA_SCLK=14     ; SCK
  ; E22-400MM22S has no DIO1 and no RESET pins
  -D P_LORA_DIO_1=-1    ; DIO1 not connected (RadioLib will use polling)
  -D P_LORA_RESET=-1    ; RESET not connected (module resets via power cycle)
  ; E22-400MM22S has external RF switch
  -D SX126X_RXEN=8      ; RX Enable
  -D SX126X_TXEN=9      ; TX Enable
  -D SX126X_DIO2_AS_RF_SWITCH=false  ; Use external RXEN/TXEN pins
  ; E22-400MM22S PA config (22dBm, PA_BOOST)
  -D SX126X_CURRENT_LIMIT=140
  ; 433 MHz is the primary band for E22-400MM22S
  -D LORA_FREQ=433.0
  ; 240x285 TFT display pins (FSPI - separate SPI controller)
  -D LCD_CS=18          ; LCD Chip Select
  -D LCD_RST=-1         ; LCD Reset (not used / power-on reset)
  -D LCD_LED=15         ; LCD Backlight / Enable
  -D VSPI_SCLK=16       ; LCD SPI Clock (FSPI CLK)
  -D VSPI_MOSI=17       ; LCD SPI MOSI (FSPI MOSI)
  -D VSPI_MISO=-1       ; LCD SPI MISO not used (FSPI MISO)
  -D VSPI_SS=18         ; LCD SPI SS (same as LCD_CS)
  ; Peripheral pins
  -D PIN_USER_BTN=0     ; G0 button
  -D PIN_BTN_2=45       ; Second physical button
  -D CUSTOM_BUZZER_PIN=3 ; Passive buzzer (custom macro to avoid pulling NonBlockingRtttl library)
  -D PIN_I2C_SDA=1      ; I2C SDA (was 2, swapped)
  -D PIN_I2C_SCL=2      ; I2C SCL (was 1, swapped)
  ; I2C peripheral addresses
  -D BMP280_I2C_ADDR=0x76
  -D LIS2DH12_I2C_ADDR=0x18
  -D CW2015_I2C_ADDR=0x62
  -D BM8563_I2C_ADDR=0x51

; === ESPWatch-LoRa with E22-400MM22S companion ===

[env:ESPWatch-LoRa_e22_400mm22s_companion]
extends = espwatch_lora_e22_400mm22s_base
build_flags =
  ${espwatch_lora_e22_400mm22s_base.build_flags}
  -D CUSTOM_BOARD
  -D DISPLAY_CLASS=ESPWatchTFTDisplay
  -D MAX_CONTACTS=200
  -D MAX_GROUP_CHANNELS=30
  -D OFFLINE_QUEUE_SIZE=256
  -D BLE_PIN_CODE=123456
  -D MESH_DEBUG=1
  -D CONFIG_BT_BTC_TASK_STACK_SIZE=4096
  -D CONFIG_BLUEDROID_PINNED_TO_CORE_0=0
  -D CONFIG_BLUEDROID_PINNED_TO_CORE_1=1
  -D CONFIG_ESP32_WIFI_TASK_PINNED_TO_CORE_0=1
  -D CONFIG_BT_GATT_MAX_SR_ATTRIBUTES=30
  -I examples/companion_radio
build_src_filter = ${espwatch_lora_e22_400mm22s_base.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/MyMesh.cpp>
  +<../examples/companion_radio/DataStore.cpp>
  +<../variants/espwatch_lora/custom_main.cpp>
  +<../variants/espwatch_lora/lcd.cpp>
  +<../variants/espwatch_lora/ESPWatchTFTDisplay.cpp>
lib_deps =
  ${espwatch_lora_e22_400mm22s_base.lib_deps}
  densaugeo/base64 @ ~1.4.0

