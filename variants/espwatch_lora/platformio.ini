[espwatch_lora_base]
extends = esp32_base
board = espwatch_lora
board_build.partitions = default_16MB.csv
build_flags =
  ${esp32_base.build_flags}
  -I variants/espwatch_lora
  -D ESPWATCH_LORA
  -D ARDUINO_USB_CDC_ON_BOOT=1
  -D ARDUINO_USB_MODE=1
  -D BOARD_HAS_PSRAM=1
  -D CORE_DEBUG_LEVEL=3
  -D PIN_USER_BTN=0
  ; LoRa module pin configuration (common for SX1262/SX1268)
  -D P_LORA_NSS=5       ; Chip Select / NSS
  -D P_LORA_DIO_1=4     ; DIO1 / IRQ
  -D P_LORA_RESET=3     ; NRST
  -D P_LORA_BUSY=6      ; BUSY
  -D P_LORA_MOSI=14     ; MOSI
  -D P_LORA_MISO=39     ; MISO
  -D P_LORA_SCLK=40     ; SCK
  ; Cardputer-Adv I2C and other pins
  -D PIN_BOARD_SDA=1
  -D PIN_BOARD_SCL=2
  -D PIN_VBAT_READ=-1   ; Battery voltage ADC
build_src_filter = ${esp32_base.build_src_filter}
  +<../variants/espwatch_lora>
  -<../variants/espwatch_lora/test_main.cpp>
  -<../variants/espwatch_lora/lcd.cpp>
  -<../variants/espwatch_lora/ESPWatchTFTDisplay.cpp>
  -<../variants/espwatch_lora/custom_main.cpp>
lib_deps =
  ${esp32_base.lib_deps}
  M5Cardputer=https://github.com/m5stack/M5Cardputer

; === ESPWatch-LoRa with SX1262 (868 MHz) ===

; [espwatch_lora_sx1262_base]
; extends = espwatch_lora_base
; build_flags =
;   ${espwatch_lora_base.build_flags}
;   -D RADIO_CLASS=CustomSX1262
;   -D WRAPPER_CLASS=CustomSX1262Wrapper
;   -D SX1262_RADIO
;   ; SX1262 radio configuration for EU_868
;   -D LORA_FREQ=868.0    ; EU 868 MHz (SX1262: 850-928 MHz)
;   -D LORA_BW=125.0      ; 125 kHz bandwidth
;   -D LORA_SF=11         ; Spreading Factor 11 (good range/speed balance)
;   -D LORA_CR=5          ; Coding Rate 4/5
;   -D LORA_TX_POWER=22   ; 22 dBm TX power
;   -D SX126X_DIO2_AS_RF_SWITCH=false  ; External RF switch (RXEN/TXEN hard-wired)
;   -D SX126X_CURRENT_LIMIT=140        ; 140 mA current limit
;   -D SX126X_RX_BOOSTED_GAIN=1        ; Enable boosted RX gain
;   -D SX126X_DIO3_TCXO_VOLTAGE=1.8    ; TCXO 1.8V

; === ESPWatch-LoRa with SX1268 (433 MHz) ===

[espwatch_lora_sx1268_base]
extends = espwatch_lora_base
build_flags =
  ${espwatch_lora_base.build_flags}
  -D RADIO_CLASS=CustomSX1268
  -D WRAPPER_CLASS=CustomSX1268Wrapper
  -D SX1268_RADIO
  ; SX1268 radio configuration for 433 MHz
  -D LORA_FREQ=433.0    ; 433 MHz (SX1268: 410-810 MHz)
  -D LORA_BW=125.0      ; 125 kHz bandwidth
  -D LORA_SF=11         ; Spreading Factor 11
  -D LORA_CR=5          ; Coding Rate 4/5
  -D LORA_TX_POWER=22   ; 22 dBm TX power
  -D SX126X_DIO2_AS_RF_SWITCH=false  ; External RF switch
  -D SX126X_CURRENT_LIMIT=140        ; 140 mA current limit
  -D SX126X_RX_BOOSTED_GAIN=1        ; Enable boosted RX gain
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8    ; TCXO 1.8V

